<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>午餐互動小遊戲</title>

<style>
body{
  margin:0;
  font-family:"Noto Sans TC",sans-serif;
  background:linear-gradient(135deg,#fff1f5,#fff8dc,#e8f7ff);
}

.container{
  max-width:720px;
  margin:auto;
  padding:24px 16px;
}

h1{
  text-align:center;
  color:#ff7c9c;
}

.card{
  background:white;
  border-radius:20px;
  padding:18px;
  margin-top:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* 🎴 話題翻卡 */
.flip-card{
  perspective:1000px;
  height:140px;
  margin-top:10px;
  cursor:pointer;
}

.flip-inner{
  width:100%;
  height:100%;
  transition:transform .5s;
  transform-style:preserve-3d;
  position:relative;
}

.flip-card.flipped .flip-inner{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:14px;
  border-radius:16px;
  border:2px solid #ffd1dc;
  background:#fff7fa;
  line-height:1.6;
}

.back{
  transform:rotateY(180deg);
}

/* 🍱 午餐卡 */
.food-wrap{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.food-card{
  flex:1;
  height:100px;
  border-radius:14px;
  border:2px solid #ffd1dc;
  background:#fff7fa;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.2s;
  text-align:center;
  padding:10px;
}

.food-card:hover{
  transform:scale(1.05);
}

.food-card.open{
  background:#ffe4ec;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h1>🍱 午餐小遊戲</h1>

<!-- 🎴 話題 -->
<div class="card">
<h3>🎴 今日聊天翻卡（點卡片）</h3>

<div class="flip-card" id="flip" onclick="flipCard()">
  <div class="flip-inner">
    <div class="face" id="front">點我翻卡</div>
    <div class="face back" id="back">...</div>
  </div>
</div>

</div>

<!-- 🍱 午餐 -->
<div class="card">
<h3>🍜 今天吃什麼（選一張）</h3>

<div class="food-wrap" id="foods"></div>

</div>

</div>

<script>

/* 🎴 話題（50+） */
const topics=[
["如果今天的雲可以吃","你覺得會是什麼口味"],
["如果影子突然有意見","它會抱怨什麼"],
["如果今天走路會掉東西","你最希望掉什麼"],
["如果今天風有個性","它會像誰"],
["如果突然出現一扇門","你會進去嗎"],
["如果天空是一句話","今天在說什麼"],
["如果咖啡會評價人","它會怎麼說"],
["如果今天有隱藏NPC","他在你旁邊做什麼"],
["如果時間卡住","你會卡在哪一刻"],
["如果可以換視角","你會選哪種"],

["如果今天所有聲音有顏色","現在是什麼顏色"],
["如果今天下奇怪的雨","你希望是什麼"],
["如果路會記得你","它會怎麼形容你"],
["如果手機有情緒","它現在心情如何"],
["如果可以放大一樣東西","你會選什麼"],
["如果世界多一條規則","會是什麼"],
["如果可以偷聽東西","你會選什麼"],
["如果今天有bug","你希望在哪"],
["如果所有東西慢一秒","你會先發現什麼"],
["如果你變成一個物件","你會是哪個"],

["如果今天有隱藏關卡","入口在哪"],
["如果可以暫停世界","你會做什麼"],
["如果空氣有味道","現在是什麼味"],
["如果世界突然安靜","你會怎樣"],
["如果大家慢半拍","你會怎樣"],
["如果有觀察者","他在記錄什麼"],
["如果可以刪掉一刻","你會刪哪"],
["如果世界變遊戲","任務是什麼"],
["如果有奇怪通知","會是什麼"],
["如果可以帶走一樣東西","你會帶什麼"],

["如果時間倒轉","你會回哪"],
["如果影子消失","你會怎樣"],
["如果天空變低","你會怎樣"],
["如果顏色變淡","你先注意哪個"],
["如果有看不見的朋友","他會陪你做什麼"],
["如果路改方向","你會跟嗎"],
["如果有奇怪聲音","你會找來源嗎"],
["如果門變重","你會卡在哪"],
["如果時間變快","你會來不及做什麼"],
["如果有隱藏訊號","在哪裡"],

["如果世界變很安靜","你會舒服嗎"],
["如果所有東西有名字","你會先幫誰取"],
["如果有一個小幸運","你會選什麼"],
["如果有奇怪任務","你覺得是什麼"],
["如果所有路一樣","你怎麼選"],
["如果可以看未來一分鐘","你會看嗎"],
["如果聲音變大","你受不了哪個"],
["如果有奇怪光","你會跟嗎"],
["如果可以藏10分鐘","你會躲哪"],
["如果今天是一句廢話","會是什麼"]
];

let currentIndex=0;
let flipped=false;

function flipCard(){
  const flip=document.getElementById("flip");

  if(!flipped){
    const t=topics[Math.floor(Math.random()*topics.length)];
    document.getElementById("front").innerHTML=t[0];
    document.getElementById("back").innerHTML=t[1];
    flip.classList.add("flipped");
    flipped=true;
  }else{
    flip.classList.remove("flipped");
    flipped=false;
  }
}

/* 🍱 午餐 */
const allFoods=[
"米粉湯","油飯","肉粽","涼麵","肉圓",
"雞腿飯","排骨飯","滷肉飯","雞肉飯",
"燒臘","咖哩飯","丼飯","牛肉麵","乾麵",
"炒飯","水餃","鍋貼","湯包","自助餐",
"陽春麵","麻醬麵","粄條","炒麵","鍋燒意麵",
"越南河粉","泰式打拋豬","韓式拌飯","韓式豆腐鍋","小火鍋",
"鐵板燒","壽司","飯糰","三明治","潛艇堡",
"健康餐盒","沙拉","便利商店便當","關東煮","蛋餅",
"燒肉飯","魚排飯","控肉飯","叉燒飯","雞排飯"
];

function generateFoods(){
  const shuffled=[...allFoods].sort(()=>0.5-Math.random()).slice(0,3);
  const box=document.getElementById("foods");
  box.innerHTML="";

  shuffled.forEach(f=>{
    const div=document.createElement("div");
    div.className="food-card";
    div.innerHTML="點我";
    div.onclick=()=>{
      div.innerHTML="👉 "+f;
      div.classList.add("open");
    };
    box.appendChild(div);
  });
}

generateFoods();

</script>
</body>
</html>
