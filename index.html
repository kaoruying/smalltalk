<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>午餐互動小遊戲</title>

<style>
body {
  margin: 0;
  font-family: "Noto Sans TC", sans-serif;
  background: linear-gradient(135deg,#fff1f5,#fff8dc,#e8f7ff);
}

.container {
  max-width: 720px;
  margin: auto;
  padding: 30px 16px;
}

h1 {
  text-align: center;
  color: #ff7c9c;
}

.card {
  background: white;
  border-radius: 24px;
  padding: 22px;
  margin-top: 20px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.08);
}

h2 {
  color: #ff8aa8;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 999px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  margin-top: 14px;
  background: linear-gradient(135deg,#ff8aa8,#ffb86c);
  color: white;
}

.card-stage {
  position: relative;
  height: 170px;
  margin-top: 18px;
  overflow: hidden;
}

.draw-card {
  position: absolute;
  inset: 0;
  background: #fff7fa;
  border: 2px solid #ffd1dc;
  border-radius: 22px;
  padding: 22px;
  box-sizing: border-box;
  line-height: 1.8;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  transition: transform 0.45s ease, opacity 0.45s ease;
}

.slide-out {
  transform: translateX(-120%) rotate(-8deg);
  opacity: 0;
}

.slide-in {
  animation: slideIn 0.45s ease;
}

@keyframes slideIn {
  from {
    transform: translateX(120%) rotate(8deg);
    opacity: 0;
  }
  to {
    transform: translateX(0) rotate(0);
    opacity: 1;
  }
}

.wheel-wrap {
  position: relative;
  width: 300px;
  height: 300px;
  margin: 24px auto 10px;
}

.pointer {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  width: 0;
  height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-top: 34px solid #ff7c9c;
}

.wheel {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  border: 8px solid #fff;
  box-shadow: 0 10px 25px rgba(0,0,0,0.12);
  transition: transform 4s cubic-bezier(.17,.67,.18,1.02);
}

.result {
  margin-top: 14px;
  padding: 16px;
  background: #fff7fa;
  border-radius: 16px;
  min-height: 50px;
  line-height: 1.8;
  font-size: 17px;
  text-align: center;
}
</style>
</head>

<body>
<div class="container">

<h1>🍱 午餐互動小遊戲</h1>

<div class="card">
  <h2>🎴 今日聊天抽卡</h2>
  <button onclick="draw()">滑一張新卡</button>
  <div class="card-stage">
    <div class="draw-card" id="q">今天要抽一張很沒負擔的怪卡。</div>
  </div>
</div>

<div class="card">
  <h2>🍜 午餐旋轉盤</h2>
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" class="wheel" width="300" height="300"></canvas>
  </div>
  <button onclick="spinWheel()">開始旋轉</button>
  <div class="result" id="f">午餐命運還沒啟動。</div>
</div>

</div>

<script>
const questions = [
"如果今天的午餐會掉落一個道具，你希望是什麼？",
"如果這家店有隱藏菜單，你覺得會是什麼？",
"今天路上看到的第一個奇怪東西是什麼？",
"如果午餐店老闆是遊戲NPC，他會說哪句台詞？",
"如果今天只能用一個音效形容，你會選什麼？",
"如果你的湯突然會講話，它第一句會說什麼？",
"今天比較像省電模式，還是亂跑模式？",
"如果這份午餐要取一個中二名字，會叫什麼？",
"如果今天公司附近出現任意門，你會先去哪？",
"如果今天只能用三個字抱怨，你會說什麼？",
"如果今天有一個無用超能力，你希望是什麼？",
"如果午餐時間可以暫停十分鐘，你會拿來做什麼？",
"如果今天可以合法消失十五分鐘，你會去哪裡？",
"如果今天走路會自帶背景音樂，你覺得是哪種？",
"如果今天要用一句廢話總結，會是什麼？"
];

function draw(){
  const card = document.getElementById("q");
  const r = questions[Math.floor(Math.random()*questions.length)];
  card.classList.add("slide-out");

  setTimeout(() => {
    card.innerHTML = r;
    card.classList.remove("slide-out");
    card.classList.add("slide-in");
  }, 250);

  setTimeout(() => {
    card.classList.remove("slide-in");
  }, 700);
}

const foods = [
"米粉湯","油飯","肉粽","涼麵","肉圓",
"便當","雞腿飯","排骨飯","滷肉飯","雞肉飯",
"燒臘便當","咖哩飯","日式丼飯","牛丼","親子丼",
"牛肉麵","餛飩麵","乾麵","湯麵","麻醬麵",
"鍋燒意麵","炒飯","炒麵","水餃","鍋貼",
"湯包","小籠包","餛飩湯","米粉炒","粄條",
"越南河粉","泰式打拋豬飯","韓式拌飯","小火鍋","鐵板燒",
"自助餐","健康餐盒","三明治","便利商店便當","壽司"
];

const colors = [
"#ffd6e0","#ffe8a3","#c9f2ff","#d8f7c5",
"#ffc9de","#ffe1b8","#cde7ff","#e4d4ff"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const size = canvas.width;
const center = size / 2;
const slice = 2 * Math.PI / foods.length;
let currentRotation = 0;
let spinning = false;

function drawWheel(){
  for(let i = 0; i < foods.length; i++){
    const start = i * slice;
    const end = start + slice;

    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, center, start, end);
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#5b4a4a";
    ctx.font = "bold 11px Noto Sans TC";
    ctx.fillText(foods[i], center - 12, 4);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(center, center, 38, 0, 2 * Math.PI);
  ctx.fillStyle = "#ffffff";
  ctx.fill();

  ctx.fillStyle = "#ff7c9c";
  ctx.font = "bold 18px Noto Sans TC";
  ctx.textAlign = "center";
  ctx.fillText("午餐", center, center + 6);
}

drawWheel();

function spinWheel(){
  if(spinning) return;
  spinning = true;

  const resultIndex = Math.floor(Math.random() * foods.length);
  const degreesPerSlice = 360 / foods.length;

  const targetAngle = 270 - (resultIndex * degreesPerSlice + degreesPerSlice / 2);
  const extraSpins = 360 * 6;
  currentRotation += extraSpins + targetAngle;

  canvas.style.transform = `rotate(${currentRotation}deg)`;

  document.getElementById("f").innerHTML = "轉盤努力運算中……";

  setTimeout(() => {
    document.getElementById("f").innerHTML = "👉 今日推薦：" + foods[resultIndex];
    spinning = false;
  }, 4100);
}
</script>

</body>
</html>
