<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>午餐互動小遊戲</title>

<style>
body{
  margin:0;
  font-family:"Noto Sans TC",sans-serif;
  background:linear-gradient(135deg,#fff1f5,#fff8dc,#e8f7ff);
}

.container{
  max-width:720px;
  margin:auto;
  padding:30px 16px;
}

h1{
  text-align:center;
  color:#ff7c9c;
}

.card{
  background:white;
  border-radius:24px;
  padding:22px;
  margin-top:20px;
  box-shadow:0 10px 24px rgba(0,0,0,0.08);
}

button{
  width:100%;
  padding:14px;
  border-radius:999px;
  border:none;
  font-size:16px;
  font-weight:bold;
  margin-top:14px;
  background:linear-gradient(135deg,#ff8aa8,#ffb86c);
  color:white;
}

/* 卡片 */
.card-stage{
  position:relative;
  height:170px;
  margin-top:18px;
  overflow:hidden;
}

.draw-card{
  position:absolute;
  inset:0;
  background:#fff7fa;
  border:2px solid #ffd1dc;
  border-radius:22px;
  padding:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  transition:transform .45s ease,opacity .45s ease;
}

.card-out{
  transform:translateX(-120%) rotate(-6deg);
  opacity:0;
}

/* 轉盤 */
.wheel-wrap{
  position:relative;
  width:300px;
  height:300px;
  margin:24px auto;
}

.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  border-left:18px solid transparent;
  border-right:18px solid transparent;
  border-top:34px solid #ff7c9c;
  z-index:5;
}

.wheel{
  width:300px;
  height:300px;
  border-radius:50%;
  border:8px solid #fff;
  transition:transform 4s cubic-bezier(.17,.67,.18,1.02);
}

.result{
  text-align:center;
  padding:16px;
  background:#fff7fa;
  border-radius:16px;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h1>🍱 午餐互動小遊戲</h1>

<div class="card">
<h2>🎴 今日聊天抽卡</h2>
<button onclick="draw()">滑一張</button>

<div class="card-stage">
<div class="draw-card" id="card1">今天抽一張怪卡</div>
<div class="draw-card" id="card2" style="transform:translateX(120%);opacity:0;"></div>
</div>
</div>

<div class="card">
<h2>🍜 午餐旋轉盤</h2>

<div class="wheel-wrap">
<div class="pointer"></div>
<canvas id="wheel" class="wheel" width="300" height="300"></canvas>
</div>

<button onclick="spinWheel()">開始旋轉</button>
<div class="result" id="f">午餐命運還沒啟動</div>

</div>

</div>

<script>

/* 聊天題目 */
const questions=[
"如果今天的湯會講話，它會吐槽什麼？",
"如果你現在是一個NPC，你會說哪句話？",
"今天比較像在過關還是在卡關？",
"如果今天有隱藏任務，你覺得是什麼？",
"如果午餐可以附贈一個技能，你要什麼？",
"今天比較像背景角色還是主角？",
"如果今天可以快轉到下班，你會按嗎？",
"如果你是一個道具，你會是哪種？",
"如果今天有一個小怪，你覺得長怎樣？",
"今天的你比較像WiFi還是行動數據？",
"如果午餐要取名字，會叫什麼？",
"今天適合認真還是隨便？",
"如果今天是一種聲音，會是什麼？",
"今天的狀態比較像幾%電量？",
"如果今天可以隱形10分鐘，你要幹嘛？",
"如果這條路會講話，它會說什麼？",
"今天比較像冰的還是熱的？",
"如果今天可以刪掉一件事，你會刪什麼？",
"如果今天是一個按鈕，你會是什麼功能？",
"今天最不想碰的是什麼？"
];

let showingCard=1;

function draw(){
  const q=questions[Math.floor(Math.random()*questions.length)];
  const c1=document.getElementById("card1");
  const c2=document.getElementById("card2");

  let current,next;

  if(showingCard===1){
    current=c1; next=c2; showingCard=2;
  }else{
    current=c2; next=c1; showingCard=1;
  }

  next.innerHTML=q;
  next.style.transform="translateX(120%)";
  next.style.opacity="0";

  requestAnimationFrame(()=>{
    current.classList.add("card-out");
    next.style.transform="translateX(0)";
    next.style.opacity="1";
  });

  setTimeout(()=>{
    current.classList.remove("card-out");
    current.style.transform="translateX(120%)";
    current.style.opacity="0";
  },450);
}

/* 轉盤 */
const foods=[
"米粉湯","油飯","肉粽","涼麵","肉圓",
"便當","雞腿飯","排骨飯","滷肉飯","雞肉飯",
"燒臘","咖哩飯","丼飯","牛肉麵","乾麵",
"炒飯","水餃","鍋貼","湯包","自助餐"
];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");
const size=300;
const center=size/2;
const slice=2*Math.PI/foods.length;

function drawWheel(){
  for(let i=0;i<foods.length;i++){
    ctx.beginPath();
    ctx.moveTo(center,center);
    ctx.arc(center,center,center,i*slice,(i+1)*slice);
    ctx.fillStyle=i%2?"#ffe1e8":"#ffd4a3";
    ctx.fill();

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(i*slice+slice/2);
    ctx.textAlign="right";
    ctx.font="12px sans-serif";
    ctx.fillText(foods[i],center-10,4);
    ctx.restore();
  }
}
drawWheel();

let currentRotation=0;

function spinWheel(){
  const index=Math.floor(Math.random()*foods.length);

  const sliceDeg=360/foods.length;

  // 🔥 修正：讓指針精準對中
  const target=360*5 + (360 - index*sliceDeg - sliceDeg/2);

  currentRotation+=target;

  canvas.style.transform=`rotate(${currentRotation}deg)`;

  setTimeout(()=>{
    document.getElementById("f").innerHTML="👉 今日推薦："+foods[index];
  },4000);
}

</script>
</body>
</html>
