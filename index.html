<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>午餐互動小遊戲</title>

<style>
body{
  margin:0;
  font-family:"Noto Sans TC",sans-serif;
  background:linear-gradient(135deg,#fff1f5,#fff8dc,#e8f7ff);
}

.container{
  max-width:720px;
  margin:auto;
  padding:30px 16px;
}

h1{text-align:center;color:#ff7c9c;}

.card{
  background:white;
  border-radius:24px;
  padding:22px;
  margin-top:20px;
  box-shadow:0 10px 24px rgba(0,0,0,0.08);
}

button{
  width:100%;
  padding:14px;
  border-radius:999px;
  border:none;
  font-size:16px;
  font-weight:bold;
  margin-top:14px;
  background:linear-gradient(135deg,#ff8aa8,#ffb86c);
  color:white;
}

/* 卡片 */
.card-stage{
  position:relative;
  height:170px;
  overflow:hidden;
}

.draw-card{
  position:absolute;
  inset:0;
  background:#fff7fa;
  border:2px solid #ffd1dc;
  border-radius:22px;
  padding:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  transition:transform .45s ease,opacity .45s ease;
}

/* 轉盤 */
.wheel-wrap{
  position:relative;
  width:300px;
  height:300px;
  margin:24px auto;
}

.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  border-left:18px solid transparent;
  border-right:18px solid transparent;
  border-top:34px solid #ff7c9c;
  z-index:5;
}

.wheel{
  width:300px;
  height:300px;
  border-radius:50%;
  border:8px solid #fff;
  transition:transform 4s cubic-bezier(.17,.67,.18,1.02);
}

.result{
  text-align:center;
  padding:16px;
  background:#fff7fa;
  border-radius:16px;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h1>🍱 午餐互動小遊戲</h1>

<div class="card">
<h2>🎴 今日聊天抽卡</h2>
<button onclick="draw()">滑一張</button>

<div class="card-stage">
<div class="draw-card" id="card">今天抽一張</div>
</div>
</div>

<div class="card">
<h2>🍜 午餐旋轉盤</h2>

<div class="wheel-wrap">
<div class="pointer"></div>
<canvas id="wheel" class="wheel"></canvas>
</div>

<button onclick="spinWheel()">開始旋轉</button>
<div class="result" id="f">午餐命運還沒啟動</div>

</div>

</div>

<script>

/* 聊天題目（具體版） */
const questions=[
"如果今天可以得到小叮噹的一個道具，你會選哪個？為什麼",
"如果你電腦可以多一個功能，你最希望是什麼",
"如果今天可以跳過一個流程，你最想跳過哪一段",
"如果滑鼠多一個按鍵，你希望它做什麼",
"如果今天有自動完成功能，你會用在哪件事",
"如果可以外包一件麻煩事給AI，你會選什麼",
"如果手機多一個模式，你希望是什麼",
"如果時間可以暫停5分鐘，你會做什麼",
"如果今天可以不用排隊，你會用在哪",
"如果一件事可以變超快，你會選哪件",
"如果今天有免責卡，你會用在哪件事",
"如果可以刪掉今天一段時間，你會刪哪段",
"如果今天多一個快捷鍵，你希望是什麼",
"如果可以不用再做一件事，你會選什麼",
"如果今天可以複製一個自己，你會讓他做什麼",
"如果今天可以直接完成一件事，你會選哪件",
"如果今天可以不用解釋，你會用在哪情境",
"如果今天有一個偷懶技能，你會用在哪",
"如果今天可以跳過思考，你會選哪件事",
"如果今天可以讓一件事變簡單，你會選什麼"
];

function draw(){
  const card=document.getElementById("card");
  const q=questions[Math.floor(Math.random()*questions.length)];

  card.style.transform="translateX(100%)";
  card.style.opacity="0";

  setTimeout(()=>{
    card.innerHTML=q;
    card.style.transition="none";
    card.style.transform="translateX(-100%)";

    requestAnimationFrame(()=>{
      card.style.transition=".45s ease";
      card.style.transform="translateX(0)";
      card.style.opacity="1";
    });
  },200);
}

/* 轉盤資料 */
const foods=[
"米粉湯","油飯","肉粽","涼麵","肉圓",
"便當","雞腿飯","排骨飯","滷肉飯","雞肉飯",
"燒臘","咖哩飯","丼飯","牛肉麵","乾麵",
"炒飯","水餃","鍋貼","湯包","自助餐"
];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

canvas.width=600;
canvas.height=600;

const size=300;
const center=size/2;
const slice=2*Math.PI/foods.length;

ctx.scale(2,2);

/* 畫轉盤 */
function drawWheel(){
  for(let i=0;i<foods.length;i++){
    ctx.beginPath();
    ctx.moveTo(center,center);
    ctx.arc(center,center,center,i*slice,(i+1)*slice);
    ctx.fillStyle=i%2?"#ffe1e8":"#ffd4a3";
    ctx.fill();

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(i*slice+slice/2);

    ctx.fillStyle="#333";
    ctx.font="bold 12px sans-serif";

    // 🔥 關鍵：文字往內縮
    ctx.fillText(foods[i],center-40,4);

    ctx.restore();
  }
}
drawWheel();

/* 音效 */
const spinSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-wheel-spin-1934.mp3");
const doneSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-game-success-1945.mp3");

let rotation=0;

/* 旋轉 */
function spinWheel(){

  const spin=360*5+Math.random()*360;
  rotation+=spin;

  spinSound.play();
  canvas.style.transform=`rotate(${rotation}deg)`;

  setTimeout(()=>{
    const index=getResultIndex();
    doneSound.play();
    document.getElementById("f").innerHTML="👉 今日推薦："+foods[index];
  },4000);
}

/* 🔥 核心：角度 → 結果 */
function getResultIndex(){
  const deg=rotation%360;

  const adjusted=(360-deg+90)%360;

  return Math.floor(adjusted/(360/foods.length));
}

</script>
</body>
</html>
